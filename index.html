<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#bcdde9">
  <title>立體圖形疊高高</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="loading">
      <div class="spinner"></div>
      <strong id="loadingText">正在建立立體教具……</strong>
    </div>

    <header class="topbar">
      <div class="brand">
        <span class="brand-icon">🧊</span>
        <div>
          <h1>立體圖形疊高高</h1>
          <p>拖動圖形，看看能不能站穩！</p>
        </div>
      </div>

      <div class="shape-menu">
        <button data-shape="cube" class="shape-btn cube-btn"><span>🧊</span>正方體</button>
        <button data-shape="cuboid" class="shape-btn cuboid-btn"><span>📦</span>長方體</button>
        <button data-shape="prism" class="shape-btn prism-btn"><span>🔺</span>三角柱</button>
        <button data-shape="sphere" class="shape-btn sphere-btn"><span>⚽</span>球體</button>
      </div>
    </header>

    <main id="scene" aria-label="3D 立體圖形互動區"></main>

    <aside class="help-card">
      <h2>玩法</h2>
      <div class="help-row"><b>1</b><span>按上方按鈕加入圖形</span></div>
      <div class="help-row"><b>2</b><span>按住圖形並拖動</span></div>
      <div class="help-row"><b>3</b><span>放手後觀察結果</span></div>
      <div class="help-row"><b>4</b><span>測試圖形能否站穩</span></div>
      <div class="tip">💡 平平的面較容易站穩，球體容易滾動。</div>
    </aside>

    <aside class="selected-card">
      <small>目前選取</small>
      <strong id="selectedName">未選取圖形</strong>
      <div class="selected-actions">
        <button id="rotateBtn">↻ 轉動</button>
        <button id="deleteBtn">🗑 刪除</button>
      </div>
    </aside>

    <div id="statusBox" class="normal" role="status" aria-live="polite">
      <span id="statusIcon">👆</span>
      <div>
        <strong id="statusTitle">開始疊高高吧！</strong>
        <p id="statusMessage">拖動圖形，把它放到其他圖形上面。</p>
      </div>
    </div>

    <nav class="bottom-menu" aria-label="遊戲控制">
      <button id="testBtn" class="main-btn">🔍 測試是否站穩</button>
      <button id="stableBtn">✅ 穩陣示範</button>
      <button id="unstableBtn">⚠️ 易跌示範</button>
      <button id="resetBtn">🔄 重新開始</button>
      <button id="clearBtn">🧹 清除</button>
    </nav>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
